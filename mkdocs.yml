site_name: research-lab
site_description: AI-first experiment management platform
site_url: https://jacobwlms.github.io/research-lab/
repo_url: https://github.com/JacobWLMS/research-lab
repo_name: JacobWLMS/research-lab

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: quickstart.md
    - Deployment: DEPLOYMENT.md
  - Reference:
    - REST API: API.md
    - CLI: CLI.md
    - MCP Server: MCP.md
    - LabContext (ctx) API: CTX_API.md
  - Architecture: ARCHITECTURE.md

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_liners: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JacobWLMS/research-lab
